name: Release

# Every push to main cuts a patch release: bump the version, tag it, open a GitHub
# Release, and publish to BOTH registries. release-it only handles the version
# bump + tag + GitHub release (it does NOT publish). The unscoped `runewood` is
# then published to npmjs via TRUSTED PUBLISHING (OIDC, no token: the runner's
# id-token is exchanged for a short-lived credential, and provenance is generated
# automatically). The same build is republished to GitHub Packages as
# `@jalapenolabs/runewood` using the built-in GITHUB_TOKEN. The release commit
# carries "[skip ci]" so it does not retrigger this workflow (and pushes made with
# GITHUB_TOKEN do not start new runs anyway, a second guard against loops).
#
# Trusted publishing requires npm CLI >= 11.5.1 and Node >= 22.14.0; the npm that
# ships with Node 22 is 10.x, so the workflow upgrades npm before publishing. The
# npmjs trusted publisher must be configured on npmjs.com (org/user, repo
# `runewood`, workflow filename `release.yml`, allowed action: npm publish).
on:
  push:
    branches: [main]

# Never run two releases at once; serialize them so versions can't collide.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  # Lets the workflow's built-in GITHUB_TOKEN publish to GitHub Packages, so the
  # @jalapenolabs scope needs no separate secret.
  packages: write

jobs:
  release:
    name: Release to npmjs + GitHub Packages
    # GitHub-HOSTED runner on purpose: npm provenance (auto-attached by trusted
    # publishing) is only verifiable from github-hosted runners, not self-hosted.
    # This job is light (node build + publish), and public repos get free hosted
    # minutes, so the heavy CI stays self-hosted while the release runs here.
    runs-on: ubuntu-latest
    # Skip the run entirely for the release bot's own commit, belt-and-suspenders
    # with [skip ci].
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          # release-it needs full history and tags to compute the next version.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Configure git identity
        run: |
          git config user.name "jalapeno-release-bot"
          git config user.email "release-bot@jalapenolabs.io"

      # release-it ONLY bumps the version, tags it, pushes the release commit, and
      # opens the GitHub Release (its npm.publish is false). The bumped version is
      # left in package.json on disk for the two publish steps below to reuse.
      #
      # The increment defaults to `patch` (the every-push auto-release), but can be
      # overridden to `minor` / `major` for a one-off milestone release by setting
      # the repo Actions variable RELEASE_INCREMENT before the push, then clearing
      # it so subsequent pushes resume patching.
      - name: Bump version, tag, and GitHub release
        run: yarn release "${RELEASE_INCREMENT:-patch}" --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_INCREMENT: ${{ vars.RELEASE_INCREMENT }}

      # Publish the unscoped `runewood` to npmjs via trusted publishing: no token,
      # the OIDC id-token is exchanged for a short-lived credential and provenance
      # is attached automatically (the registry is already npmjs from setup-node).
      - name: Publish to npmjs (trusted publishing)
        run: npm publish

      # Re-point npm at GitHub Packages for the @jalapenolabs scope. setup-node
      # rewrites the auth config so `npm publish` below targets npm.pkg.github.com,
      # authenticated by the built-in GITHUB_TOKEN (no extra secret needed).
      - name: Configure npm for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@jalapenolabs'

      # Publish the SAME just-built dist (same version release-it bumped) to GitHub
      # Packages under the org scope. Only the package name is rewritten, on the
      # ephemeral runner copy, never committed.
      - name: Publish to GitHub Packages
        run: |
          npm pkg set name=@jalapenolabs/runewood
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
