name: Release

# Every push to main cuts a patch release: bump the version, tag it, publish to
# BOTH registries, and open a GitHub Release. release-it publishes the unscoped
# `runewood` to npmjs; a follow-up step republishes the same build to GitHub
# Packages as `@jalapenolabs/runewood`. The release commit carries "[skip ci]" so
# it does not retrigger this workflow (and pushes made with GITHUB_TOKEN do not
# start new runs anyway, a second guard against loops).
on:
  push:
    branches: [main]

# Never run two releases at once; serialize them so versions can't collide.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  # Lets the workflow's built-in GITHUB_TOKEN publish to GitHub Packages, so the
  # @jalapenolabs scope needs no separate secret.
  packages: write

jobs:
  release:
    name: Patch release to npm
    runs-on: [self-hosted, Linux, X64, fedora]
    # Skip the run entirely for the release bot's own commit, belt-and-suspenders
    # with [skip ci].
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          # release-it needs full history and tags to compute the next version.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Configure git identity
        run: |
          git config user.name "jalapeno-release-bot"
          git config user.email "release-bot@jalapenolabs.io"

      # Publishes the unscoped `runewood` to npmjs, bumps + tags the version, pushes
      # the release commit, and opens the GitHub Release. The bumped version is left
      # in package.json on disk for the GitHub Packages step below to reuse.
      - name: Release to npmjs
        run: yarn release patch --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Re-point npm at GitHub Packages for the @jalapenolabs scope. setup-node
      # rewrites the auth config so `npm publish` below targets npm.pkg.github.com,
      # authenticated by the built-in GITHUB_TOKEN (no extra secret needed).
      - name: Configure npm for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@jalapenolabs'

      # Publish the SAME just-built dist (same version release-it bumped) to GitHub
      # Packages under the org scope. Only the package name is rewritten, on the
      # ephemeral runner copy, never committed.
      - name: Publish to GitHub Packages
        run: |
          npm pkg set name=@jalapenolabs/runewood
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
